name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag matches version
        run: |
          TAG="${GITHUB_REF##*/}"
          VERSION=$(grep -Eo 'Version = "[^"]+"' internal/version/version.go | sed -E 's/Version = "([^"]+)"/\1/')
          if [ -z "$VERSION" ]; then
            echo "Unable to determine version from internal/version/version.go" >&2
            exit 1
          fi
          if [ "v${VERSION}" != "$TAG" ]; then
            echo "Tag $TAG does not match internal/version/version.go v${VERSION}" >&2
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Devcontainer Feature
        uses: devcontainers/action@v1
        with:
          publish-features: "true"
          base-path-to-features: "./devcontainer-feature/src"
          features-namespace: "notwillk/nara"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
