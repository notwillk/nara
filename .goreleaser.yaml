# https://goreleaser.com
version: 2

project_name: nara

before:
  hooks:
    - go mod tidy

builds:
  - id: nara
    binary: nara
    main: .
    ldflags:
      - -s
      - -w
      # CI sets VERSION to the git tag; otherwise use .Tag from the release ref; else local-build.
      - -X=github.com/notwillk/nara/internal/version.Version={{ (index .Env "VERSION") | default .Tag | default "local-build" }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - Merge pull request
      - Merge branch
